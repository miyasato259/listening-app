<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="リスニング特訓">
<title>音変化リスニング特訓 — つなぎ・弱音・消える音</title>
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --border: #e0ddd4;
    --border-strong: #c9c5b8;
    --text: #2c2c2a;
    --text-secondary: #6b6a64;
    --text-tertiary: #9b9a92;
    --accent-link: #534ab7;
    --accent-link-bg: rgba(127,119,221,0.18);
    --accent-weak: #0f6e56;
    --accent-weak-bg: rgba(29,158,117,0.18);
    --accent-elision: #993c1d;
    --accent-elision-bg: rgba(216,90,48,0.18);
    --success: #3b6d11;
    --success-bg: #eaf3de;
    --danger: #a32d2d;
    --danger-bg: #fcebeb;
    --warning: #854f0b;
    --warning-bg: #faeeda;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    padding-bottom: 2rem;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 1rem 1rem 2rem;
  }

  header {
    padding: 1rem 0 0.5rem;
    text-align: center;
  }
  header h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 4px;
  }
  header p {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0;
  }

  .statusbar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin: 1rem 0;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 8px 14px;
    font-size: 13px;
  }
  .stat-pill .val {
    font-size: 15px;
    font-weight: 500;
    margin-left: 6px;
  }
  .stat-pill .label {
    color: var(--text-secondary);
  }

  button {
    font-family: inherit;
    font-size: 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    background: var(--surface);
    color: var(--text);
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
  }
  button:hover { background: #f0eee7; }
  button:active { transform: scale(0.98); }

  .icon-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  select {
    font-family: inherit;
    font-size: 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    background: var(--surface);
    color: var(--text);
    padding: 8px 10px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .panel-secondary {
    background: #efece3;
    border-radius: var(--radius-md);
    padding: 1rem;
    margin-bottom: 1rem;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .banner {
    border-radius: var(--radius-md);
    padding: 8px 14px;
    margin-bottom: 1rem;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .banner-warning { background: var(--warning-bg); color: var(--warning); }
  .banner-danger { background: var(--danger-bg); color: var(--danger); }
  .banner button { font-size: 12px; padding: 2px 10px; }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .voice-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .voice-row:last-child { border-bottom: none; }
  .voice-row label {
    flex: 1;
    font-size: 13px;
    color: var(--text);
  }
  .voice-row button {
    font-size: 12px;
    padding: 4px 10px;
  }

  .choices {
    display: grid;
    gap: 8px;
  }
  .choices button {
    text-align: left;
    padding: 12px 14px;
    line-height: 1.5;
  }
  .choices button.correct {
    border-color: var(--success);
    background: var(--success-bg);
  }
  .choices button.incorrect {
    border-color: var(--danger);
    background: var(--danger-bg);
  }

  #feedback {
    margin-top: 12px;
    font-size: 14px;
    min-height: 1.5em;
  }
  #feedback .ok { color: var(--success); }
  #feedback .ng { color: var(--danger); }

  .explain-card {
    display: none;
  }
  .explain-card .sentence {
    font-weight: 500;
    font-size: 16px;
    margin: 0 0 6px;
  }
  .explain-card .kana {
    font-size: 13px;
    margin: 0 0 10px;
    color: var(--text-secondary);
  }
  .explain-card .ja {
    font-size: 14px;
    margin: 0 0 10px;
    color: var(--text-secondary);
  }
  .notes { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .note-item {
    border-radius: var(--radius-md);
    padding: 8px 10px;
    font-size: 13px;
    line-height: 1.6;
  }
  .note-item strong { font-weight: 500; }
  .note-link { background: var(--accent-link-bg); }
  .note-weak { background: var(--accent-weak-bg); }
  .note-elision { background: var(--accent-elision-bg); }

  .mark-link { background: var(--accent-link-bg); color: var(--text); padding: 1px 3px; border-radius: 4px; }
  .mark-weak { background: var(--accent-weak-bg); color: var(--text); padding: 1px 3px; border-radius: 4px; }
  .mark-elision { background: var(--accent-elision-bg); color: var(--text); padding: 1px 3px; border-radius: 4px; }

  .score-row {
    display: flex;
    gap: 16px;
    margin-top: 1.5rem;
    justify-content: center;
  }
  .score-item { text-align: center; }
  .score-item .label { font-size: 13px; color: var(--text-secondary); margin: 0; }
  .score-item .num { font-size: 20px; font-weight: 500; margin: 2px 0 0; }

  .footer-row {
    text-align: center;
    margin-top: 2rem;
  }
  .footer-row button {
    font-size: 12px;
    color: var(--text-tertiary);
  }

:root{--accent-assim:#1f6f8b;--accent-assim-bg:rgba(31,127,140,0.16);--accent-flap:#a23b86;--accent-flap-bg:rgba(170,60,140,0.15);}
.mark-assim{background:var(--accent-assim-bg);color:var(--text);padding:1px 3px;border-radius:4px;}
.mark-flap{background:var(--accent-flap-bg);color:var(--text);padding:1px 3px;border-radius:4px;}
.note-assim{background:var(--accent-assim-bg);}
.note-flap{background:var(--accent-flap-bg);}
.menu{max-width:640px;margin:0 auto;padding:0 1rem;display:flex;flex-direction:column;gap:14px;}
.menucard{display:flex;flex-direction:column;align-items:flex-start;gap:6px;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;cursor:pointer;width:100%;}
.menucard:hover{background:#f0eee7;}
.mc-ic{font-size:26px;}
.mc-t{font-size:16px;font-weight:600;color:var(--text);}
.mc-d{font-size:13px;color:var(--text-secondary);line-height:1.6;font-weight:400;}
.backbtn{margin:12px 0 0 12px;font-size:13px;color:var(--text-secondary);background:transparent;border:1px solid var(--border);}
#screen-trap .traphd{text-align:center;padding:0.6rem 0 0.2rem;}
#screen-trap .traphd h1{font-size:18px;font-weight:600;margin:0;}
#screen-trap .traphd p{font-size:12.5px;color:var(--text-secondary);margin:4px 0 0;}
#screen-trap .trapbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:10px 0;}
#screen-trap .trapseg{display:flex;background:#efece3;border-radius:10px;padding:3px;gap:2px;flex-wrap:wrap;}
#screen-trap .trapseg button{border:0;background:transparent;padding:7px 11px;border-radius:8px;font-size:13px;color:var(--text);font-weight:600;}
#screen-trap .trapseg button.on{background:var(--text);color:var(--surface);}
#screen-trap .trapstat{margin-left:auto;font-size:13px;color:var(--text-secondary);}
#screen-trap .trapstat b{color:var(--text);font-size:15px;}
#screen-trap .trcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;}
#screen-trap .trbadge{font-size:11.5px;font-weight:700;color:#fff;background:#7a3cb8;padding:3px 9px;border-radius:999px;}
#screen-trap .trbadge.c7{background:#1f6f8b;}
#screen-trap .trbadge.c5{background:#b8632f;}
#screen-trap .trscene{font-size:12.5px;color:var(--text-secondary);}
#screen-trap .trscript{background:#efece3;border:1px dashed var(--border-strong);border-radius:10px;padding:11px 13px;font-size:14px;white-space:pre-wrap;margin:8px 0;}
#screen-trap .trq{font-weight:600;margin:12px 0 8px;}
#screen-trap .trchoices{display:flex;flex-direction:column;gap:8px;}
#screen-trap .trchoice{text-align:left;border:1.5px solid var(--border-strong);background:var(--surface);border-radius:10px;padding:11px 13px;font-size:14px;cursor:pointer;line-height:1.5;}
#screen-trap .trchoice.correct{border-color:var(--success);background:var(--success-bg);}
#screen-trap .trchoice.wrong{border-color:var(--danger);background:var(--danger-bg);}
#screen-trap .trchoice.dim{opacity:.75;}
#screen-trap .trfb{margin-top:12px;border-top:1px solid var(--border);padding-top:10px;display:none;}
#screen-trap .trfb.show{display:block;}
#screen-trap .trverdict{font-weight:700;margin-bottom:6px;}
#screen-trap .trverdict.ok{color:var(--success);}
#screen-trap .trverdict.ng{color:var(--danger);}
#screen-trap .trwhy{font-size:13px;margin:4px 0;padding-left:24px;position:relative;}
#screen-trap .trwhy .mk{position:absolute;left:0;font-weight:700;}
#screen-trap .trwhy.ok .mk{color:var(--success);}
#screen-trap .trwhy.ng .mk{color:var(--danger);}
#screen-trap .trtip{background:var(--warning-bg);border:1px solid #f0dca0;border-radius:10px;padding:9px 12px;font-size:13px;margin-top:9px;}
#screen-trap .trnav{display:flex;gap:8px;margin-top:12px;}
#screen-trap .trnav .next{margin-left:auto;}
#screen-trap .trbtn{border:1px solid var(--border-strong);border-radius:10px;padding:9px 13px;font-size:13.5px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text);}
#screen-trap .trbtn.play{background:#534ab7;color:#fff;border-color:#534ab7;}
#screen-trap .trbtn.next{background:var(--text);color:var(--surface);border-color:var(--text);}
#screen-trap .trsum{text-align:center;}
#screen-trap .trmeter{flex:1;height:13px;background:#efece3;border-radius:7px;overflow:hidden;}
#screen-trap .trmeter i{display:block;height:100%;background:var(--success);}
</style>
</head>
<body>
<div id="screen-home" class="screen">
  <header style="text-align:center;padding:1.5rem 0 0.5rem;">
    <h1 style="font-size:20px;font-weight:600;margin:0 0 4px;">共通テスト リスニング 特訓</h1>
    <p style="color:var(--text-secondary);font-size:13px;margin:0;">2つの力を分けて鍛える</p>
  </header>
  <div class="menu">
    <button class="menucard" data-go="sound">
      <span class="mc-ic">🎧</span>
      <span class="mc-t">① 音を聞き取る — 音変化トレーニング</span>
      <span class="mc-d">連結・同化・脱落・弱形・ら行化の<b>5分類</b>。レベル別ディクテーションで、速い音・消える音を聞き取る耳を作る。</span>
    </button>
    <button class="menucard" data-go="trap">
      <span class="mc-ic">🎯</span>
      <span class="mc-t">② 罠を見抜く — ひっかけ見抜き道場</span>
      <span class="mc-d">結論・態度（C9）／言い換え（C7）／視覚照合（C5）。作問者のひっかけを見抜く目を鍛える。</span>
    </button>
  </div>
</div>
<div id="screen-sound" class="screen" style="display:none;">
<button class="backbtn" data-back>← メニュー</button>

<div class="container">
  <header>
    <h1>音変化リスニング特訓</h1>
    <p>①つなぎ ②弱音 ③消える音 を聞き分ける</p>
  </header>

  <div class="statusbar">
    <div class="stat-pill"><span class="label">レベル</span><span class="val" id="levelLabel"></span></div>
    <div class="stat-pill"><span class="label">連続正解</span><span class="val" id="streak">0</span></div>
    <button id="weakbtn" class="icon-btn" style="margin-left:auto;">弱点分析</button>
    <button id="voicebtn" class="icon-btn">声を選ぶ</button>
  </div>

  <div id="weakPanel" class="panel-secondary" style="display:none;">
    <p style="font-weight:500; margin:0 0 8px; color:var(--text);">弱点分析</p>
    <div id="weakContent"></div>
    <button id="drillbtn" class="icon-btn" style="margin-top:10px;">猛特訓モードで弱点を集中練習</button>
  </div>

  <div id="voicePanel" class="panel-secondary" style="display:none;">
    <p style="font-weight:500; margin:0 0 4px; color:var(--text);">使う音声を選ぶ</p>
    <p style="margin:0 0 8px;">チェックした音声の中からランダムに選ばれます。「試聴」で実際の声を確認できます。</p>
    <div id="voiceList"></div>
  </div>

  <div id="drillBanner" class="banner banner-warning" style="display:none;">
    <span>猛特訓モード中</span>
    <button id="exitDrill">通常モードに戻る</button>
  </div>

  <div id="retryBanner" class="banner banner-danger" style="display:none;">
    同じレベルの新しい問題です。正解するまで続きます。
  </div>

  <div id="intro" class="panel-secondary"></div>

  <div class="controls-row">
    <button id="playbtn" class="icon-btn">▶ 再生</button>
    <label style="font-size:13px; color:var(--text-secondary);">速度</label>
    <select id="speed">
      <option value="1">ノーマル</option>
      <option value="0.7">ゆっくり</option>
      <option value="0.5">超ゆっくり</option>
    </select>
  </div>

  <div id="voiceDebug" style="font-size:11px; color:var(--text-secondary); margin-top:4px;"></div>

  <div class="panel">
    <p style="font-size:13px; color:var(--text-secondary); margin:0 0 8px;">この音は何と聞こえましたか?選んでください</p>
    <div id="choices" class="choices"></div>
    <div id="feedback"></div>
  </div>

  <div id="explainCard" class="panel-secondary explain-card">
    <p class="sentence" id="explainSentence"></p>
    <p class="kana" id="explainKana"></p>
    <p class="ja" id="explainJa"></p>
    <div class="notes" id="explainNotes"></div>
    <button id="nextbtn" class="icon-btn">次へ →</button>
  </div>

  <div class="score-row">
    <div class="score-item"><p class="label">正解</p><p class="num" id="score">0</p></div>
    <div class="score-item"><p class="label">挑戦</p><p class="num" id="total">0</p></div>
    <div class="score-item"><p class="label">このレベルの問題数</p><p class="num" id="bankSize">0</p></div>
  </div>

  <div class="footer-row">
    <button id="resetbtn">進捗をリセットする</button>
  </div>
</div>
</div><!-- /screen-sound -->

<div id="screen-trap" class="screen" style="display:none;">
<button class="backbtn" data-back>← メニュー</button>
<div class="container">
  <div class="traphd"><h1>ひっかけ見抜き道場</h1><p>英文を読む/聞く → 罠の選択肢を見抜いて解答 → 解説で型を確認（C9→C7→C5）</p></div>
  <div class="trapbar">
    <div class="trapseg" id="t_seg">
      <button data-m="all" class="on">順番に</button>
      <button data-m="C9">C9 結論</button>
      <button data-m="C7">C7 言い換え</button>
      <button data-m="C5">C5 視覚</button>
    </div>
    <div class="trapstat">第 <b id="t_pos">1</b>/<span id="t_total">18</span>　正解 <b id="t_score">0</b></div>
  </div>
  <div id="t_app"></div>
</div>
</div>

<script>
const LEVELS = ['中1〜中2','中3〜高1','高2','高3標準','共通テスト/英検準1級'];

const bank = [
{level:1, cat:'link', full:"What are you doing?", ja:"何をしているの?", spoken:"ワッチャ ドゥーイン", choices:["What are you doing?","What you doing?","What you're doing?"], answer:0,
 markers:[{type:'link', text:'are you', note:"areの母音と次のyouのyが融合して「ワッチャ」のように聞こえます。areとyouが一塊になる典型的なつなぎです。"}]},
{level:1, cat:'weak', full:"I'd like a cup of tea.", ja:"お茶を一杯いただきたいです。", spoken:"アイドゥ ライカ カパ ティー", choices:["I'd like a cup of tea.","I'd like a cup off tea.","I'd like a cop of tea."], answer:0,
 markers:[{type:'weak', text:'of', note:"ofは弱形で「ə」とほぼ聞こえなくなります。a cup of teaが「ア カパ ティー」のように一気に発音されます。"}]},
{level:1, cat:'link', full:"Nice to meet you.", ja:"初めまして。", spoken:"ナイス トゥ ミーチュー", choices:["Nice to meet you.","Nice to meet to.","Nice to meet through."], answer:0,
 markers:[{type:'link', text:'meet you', note:"meet youのt+yはpalatalizationにより「チュー」のような音に変化します。"}]},
{level:1, cat:'elision', full:"I don't know.", ja:"知りません。", spoken:"アイ ドゥノウ", choices:["I don't know.","I didn't know.","I don't go."], answer:0,
 markers:[{type:'elision', text:"don't", note:"don'tの最後のtはnの後で脱落し、ほぼ「ドン」となります。don't knowは「ドゥノウ」のように一語化します。"}]},
{level:1, cat:'weak', full:"He can swim well.", ja:"彼は上手に泳げます。", spoken:"ヒー クン スウィム ウェル", choices:["He can swim well.","He can't swim well.","He came swim well."], answer:0,
 markers:[{type:'weak', text:'can', note:"肯定文のcanは弱形で「kən」、強勢がほとんどなく一瞬で発音されます。"}]},
{level:1, cat:'link', full:"Turn off the light.", ja:"電気を消してください。", spoken:"ターノフ ザ ライト", choices:["Turn off the light.","Turn of the light.","Turn often light."], answer:0,
 markers:[{type:'link', text:'Turn off', note:"turn offのnとoffがつながり「ターノフ」のように一語化します。子音+母音の典型的なリンキングです。"}]},
{level:1, cat:'weak', full:"There is a cat under the table.", ja:"テーブルの下に猫がいます。", spoken:"ゼァリザ キャット アンダ ザ テイブル", choices:["There is a cat under the table.","There was a cat under the table.","Their is a cat under the table."], answer:0,
 markers:[{type:'weak', text:'There is a', note:"There isのisがつながり「ゼァリズ」、さらにa catとつながって「ゼァリザ キャット」のように聞こえます。"}]},
{level:1, cat:'link', full:"Look at this picture.", ja:"この写真を見てください。", spoken:"ルッカッ ディス ピクチャ", choices:["Look at this picture.","Look that this picture.","Look it this picture."], answer:0,
 markers:[{type:'link', text:'Look at', note:"子音kと母音aがつながり「ルッカッ」のように聞こえます。look atは超高頻度のリンキングです。"}]},
{level:1, cat:'weak', full:"I want to play soccer.", ja:"サッカーをしたいです。", spoken:"アイ ワナ プレイ サッカー", choices:["I want to play soccer.","I won't play soccer.","I want a play soccer."], answer:0,
 markers:[{type:'weak', text:'want to', note:"want toは非常に高頻度で「ワナ」に変化します。tの音が消えてto→naのように同化します。"}]},
{level:1, cat:'link', full:"Can I borrow this pen?", ja:"このペンを借りてもいいですか?", spoken:"キャナイ ボロウ ディス ペン", choices:["Can I borrow this pen?","Can you borrow this pen?","Can I borrow this hen?"], answer:0,
 markers:[{type:'link', text:'Can I', note:"Can Iのnとaの母音がつながり「キャナイ」のように一語化します。canの弱形+Iの典型的なリンキングです。"}]},

const STORAGE_KEY = 'listening_trainer_progress_v2';

let state = {
  level: 1,
  score: 0,
  total: 0,
  streak: 0,
  mistakes: {},
  weaknessByCat: {link:{wrong:0,total:0}, assim:{wrong:0,total:0}, elision:{wrong:0,total:0}, weak:{wrong:0,total:0}, flap:{wrong:0,total:0}},
  usedInLevel: []
};

let queue = [];
let currentItem = null;
let drillMode = false;
let isRetry = false;
let answered = false;

// 英語音声を確実に選択するための処理（iOSで日本語音声が使われてしまう問題への対策）
// ※ const宣言は、下の loadVoices() 呼び出しより前に置く必要がある
//   （iOSのSafariはページ読み込み時に音声リストを即時に返すことがあり、
//    その場合 loadVoices() がここで使う定数を先に参照してしまうため）

// 共通テスト・TOEIC等で出題される、標準的な英語圏のアクセント
const STANDARD_TEST_LOCALES = ['en-us', 'en-gb', 'en-au', 'en-ca'];
// 漫画的・ロボット的な「ノベルティ音声」（試験対策には不向き）の名前
// iPadが日本語環境だと、音声名が日本語で返ってくることがあるため、
// 英語名・日本語名の両方を含めている
const NOVELTY_VOICE_NAMES = [
  // 英語名
  'albert', 'bad news', 'bahh', 'bells', 'boing', 'bubbles', 'cellos',
  'wobble', 'hysterical', 'organ', 'pipe organ', 'trinoids', 'whisper',
  'zarvox', 'good news', 'jester', 'superstar', 'junior', 'kathy',
  'ralph', 'princess', 'eddy', 'flo', 'grandma', 'grandpa', 'reed',
  'rocko', 'sandy', 'shelley', 'eloquence',
  // 日本語のローカライズ名
  'オルガン', 'パイプオルガン', 'ささやき声', 'ささやき',
  '震え', 'わななき', 'トリノイド',
  '道化', '道化師', 'ジェスター',
  'アルバート', 'バー', 'ベル', 'ボイン', 'バブル', 'チェロ',
  'ヒステリック', 'ザーボックス', 'スーパースター', 'ジュニア',
  'キャシー', 'ラルフ', 'プリンセス', 'エディ', 'フロー',
  'グランマ', 'グランパ', 'リード', 'ロッコ', 'サンディ', 'シェリー',
  '悪い知らせ', '良い知らせ', 'いい知らせ'
];
// ユーザーが「声を選ぶ」パネルで選んだ音声名を保存するキー
const VOICE_SELECTION_KEY = 'listening_trainer_voice_selection_v1';

let cachedVoices = [];
let currentVoice = null;
function loadVoices() {
  cachedVoices = speechSynthesis.getVoices();
  updateVoiceDebug();
}
if ('speechSynthesis' in window) {
  loadVoices();
  if ('onvoiceschanged' in speechSynthesis) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }
}
// 利用可能な英語音声(en-*)を全部リストアップ（フィルタなし）
function getAllEnglishVoices() {
  const voices = cachedVoices.length ? cachedVoices : speechSynthesis.getVoices();
  return voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('en'));
}
// 試験対策に適した標準アクセント・通常の声に絞り込んだデフォルト一覧
// （ユーザーが「声を選ぶ」でまだ何も選んでいない場合の初期状態として使う）
function getDefaultEnglishVoices() {
  const allEnglish = getAllEnglishVoices();

  const filtered = allEnglish.filter(v => {
    const lang = v.lang.toLowerCase();
    const name = v.name.toLowerCase();
    const isStandardLocale = STANDARD_TEST_LOCALES.includes(lang);
    const isNovelty = NOVELTY_VOICE_NAMES.some(n => name.includes(n));
    return isStandardLocale && !isNovelty;
  });

  // 絞り込んだ結果0件になった場合は、元のen-*リストにフォールバック
  return filtered.length > 0 ? filtered : allEnglish;
}

// ユーザーが「声を選ぶ」パネルで選んだ音声名を保存・読み込み
function loadVoiceSelection() {
  try {
    const raw = localStorage.getItem(VOICE_SELECTION_KEY);
    if (!raw) return null;
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : null;
  } catch (e) {
    return null;
  }
}
function saveVoiceSelection(names) {
  try {
    localStorage.setItem(VOICE_SELECTION_KEY, JSON.stringify(names));
  } catch (e) {}
}

// 実際にランダム再生で使う音声一覧
// ユーザーが選んだ音声があればそれを優先し、なければデフォルトの絞り込み結果を使う
function getEnglishVoices() {
  const all = getAllEnglishVoices();
  const selection = loadVoiceSelection();
  if (selection && selection.length > 0) {
    const filtered = all.filter(v => selection.includes(v.name));
    if (filtered.length > 0) return filtered;
  }
  return getDefaultEnglishVoices();
}
// その中からランダムに1つ選ぶ（男性・女性・様々なアクセントが混在）
function pickRandomEnglishVoice() {
  const enVoices = getEnglishVoices();
  if (enVoices.length === 0) return null;
  return enVoices[Math.floor(Math.random() * enVoices.length)];
}
// 現在使える英語音声の一覧と、選ばれている音声を画面に表示（デバッグ用）
function updateVoiceDebug() {
  const el = document.getElementById('voiceDebug');
  if (!el) return;
  const enVoices = getEnglishVoices();
  if (enVoices.length === 0) {
    el.textContent = '英語音声: 取得できていません（0個）';
    return;
  }
  const names = enVoices.map(v => v.name + '(' + v.lang + ')').join(', ');
  const current = currentVoice ? (currentVoice.name + '(' + currentVoice.lang + ')') : '未選択';
  el.textContent = '英語音声 ' + enVoices.length + '個: ' + names + ' / 今回: ' + current;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// 「声を選ぶ」パネルの中身を描画する
function renderVoicePanel() {
  const listEl = document.getElementById('voiceList');
  if (!listEl) return;
  const all = getAllEnglishVoices();
  if (all.length === 0) {
    listEl.innerHTML = '<p>英語の音声が見つかりません。iPadの設定 &gt; アクセシビリティ &gt; 読み上げコンテンツ &gt; 声、から英語の音声を追加してください。</p>';
    return;
  }

  let selection = loadVoiceSelection();
  if (!selection) {
    selection = getDefaultEnglishVoices().map(v => v.name);
  }

  let html = '';
  all.forEach((v, i) => {
    const checked = selection.includes(v.name) ? 'checked' : '';
    const id = 'voice_' + i;
    html += '<div class="voice-row">'
      + '<input type="checkbox" id="' + id + '" data-name="' + escapeHtml(v.name) + '" ' + checked + '>'
      + '<label for="' + id + '">' + escapeHtml(v.name) + ' (' + escapeHtml(v.lang) + ')</label>'
      + '<button type="button" class="icon-btn voice-test-btn" data-name="' + escapeHtml(v.name) + '">試聴</button>'
      + '</div>';
  });
  listEl.innerHTML = html;

  listEl.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      const checkedNames = Array.from(listEl.querySelectorAll('input[type=checkbox]:checked')).map(c => c.dataset.name);
      saveVoiceSelection(checkedNames);
      currentVoice = null; // 次回再生時に選び直す
      updateVoiceDebug();
    });
  });

  listEl.querySelectorAll('.voice-test-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      playVoiceSample(btn.dataset.name);
    });
  });
}

// 指定した音声でサンプル文を再生する（試聴用）
function playVoiceSample(voiceName) {
  if (!('speechSynthesis' in window)) return;
  const all = getAllEnglishVoices();
  const voice = all.find(v => v.name === voiceName);
  if (!voice) return;
  const sample = 'This is a sample of this voice. Thank you for listening.';
  const utter = new SpeechSynthesisUtterance(sample);
  utter.voice = voice;
  utter.lang = voice.lang;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn('保存に失敗しました', e);
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = Object.assign(state, parsed);
      if (!state.weaknessByCat) state.weaknessByCat = {link:{wrong:0,total:0}, assim:{wrong:0,total:0}, elision:{wrong:0,total:0}, weak:{wrong:0,total:0}, flap:{wrong:0,total:0}};
      if (!state.mistakes) state.mistakes = {};
      if (!state.usedInLevel) state.usedInLevel = [];
    }
  } catch (e) {
    console.warn('読み込みに失敗しました', e);
  }
}

function indexOf(item){ return bank.indexOf(item); }

function buildQueueForLevel(lv) {
  const pool = bank.filter(b => b.level === lv);
  return shuffle([...pool]);
}
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickRetryItem(lv) {
  const pool = bank.filter(b => b.level === lv);
  const usedSet = new Set(state.usedInLevel);
  const unused = pool.filter(b => !usedSet.has(indexOf(b)));
  if (unused.length > 0) {
    return unused[Math.floor(Math.random() * unused.length)];
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

function pickNext() {
  if (drillMode) {
    const weakKeys = Object.keys(state.mistakes).filter(k => state.mistakes[k] > 0);
    if (weakKeys.length === 0) {
      drillMode = false;
      document.getElementById('drillBanner').style.display = 'none';
    } else {
      const idx = parseInt(weakKeys[Math.floor(Math.random() * weakKeys.length)]);
      return bank[idx];
    }
  }
  if (isRetry) {
    return pickRetryItem(state.level);
  }
  if (queue.length === 0) {
    if (state.level < 5) state.level++;
    queue = buildQueueForLevel(state.level);
    state.usedInLevel = [];
  }
  return queue.shift();
}

function highlightSentence(item) {
  const markersSorted = [...item.markers].sort((a,b) => b.text.length - a.text.length);
  let result = item.full;
  markersSorted.forEach((m, mi) => {
    const tag = catInfo[m.type].tag;
    const placeholderOpen = '%%OPEN' + mi + '%%';
    const placeholderClose = '%%CLOSE' + mi + '%%';
    const idx2 = result.indexOf(m.text);
    if (idx2 >= 0) {
      result = result.slice(0, idx2) + placeholderOpen + m.text + ' ' + tag + placeholderClose + result.slice(idx2 + m.text.length);
    }
  });
  markersSorted.forEach((m, mi) => {
    const cls = MARKCLS[m.type] || 'mark-link';
    result = result.replace('%%OPEN' + mi + '%%', '<span class="' + cls + '">');
    result = result.replace('%%CLOSE' + mi + '%%', '</span>');
  });
  return result;
}

function render() {
  document.getElementById('levelLabel').textContent = LEVELS[state.level-1];
  document.getElementById('streak').textContent = state.streak;
  document.getElementById('retryBanner').style.display = isRetry ? 'flex' : 'none';
  currentItem = pickNext();
  currentVoice = pickRandomEnglishVoice();
  updateVoiceDebug();
  if (!isRetry) state.usedInLevel.push(indexOf(currentItem));
  answered = false;
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('explainCard').style.display = 'none';

  const ci = catInfo[currentItem.cat];
  document.getElementById('intro').innerHTML = '<strong style="font-weight:500; color:var(--text);">' + ci.name + '</strong> &mdash; ' + ci.desc;

  const poolSize = bank.filter(b => b.level === state.level).length;
  document.getElementById('bankSize').textContent = poolSize;
  document.getElementById('score').textContent = state.score;
  document.getElementById('total').textContent = state.total;

  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  const order = shuffle([0,1,2]);
  order.forEach(i => {
    const btn = document.createElement('button');
    btn.textContent = currentItem.choices[i];
    btn.onclick = () => selectAnswer(i, btn);
    choicesDiv.appendChild(btn);
  });

  saveState();
}

function selectAnswer(i, btn) {
  if (answered) return;
  answered = true;
  state.total++;
  const item = currentItem;
  const key = indexOf(item);
  const fb = document.getElementById('feedback');

  state.weaknessByCat[item.cat].total++;

  if (i === item.answer) {
    state.score++;
    state.streak++;
    isRetry = false;
    fb.innerHTML = '<span class="ok">正解です</span>';
    btn.classList.add('correct');
    if (state.mistakes[key] > 0) state.mistakes[key]--;
  } else {
    state.streak = 0;
    isRetry = true;
    state.weaknessByCat[item.cat].wrong++;
    state.mistakes[key] = (state.mistakes[key] || 0) + 2;
    fb.innerHTML = '<span class="ng">不正解 &mdash; 同じレベルの新しい問題に挑戦しましょう</span>';
    btn.classList.add('incorrect');
    const buttons = document.querySelectorAll('#choices button');
    buttons.forEach(b => { if (b.textContent === item.choices[item.answer]) b.classList.add('correct'); });
  }
  document.getElementById('score').textContent = state.score;
  document.getElementById('total').textContent = state.total;
  document.getElementById('streak').textContent = state.streak;

  document.getElementById('explainSentence').innerHTML = highlightSentence(item);
  document.getElementById('explainKana').textContent = '発音イメージ: ' + item.spoken;
  document.getElementById('explainJa').textContent = '訳: ' + item.ja;

  const notesDiv = document.getElementById('explainNotes');
  notesDiv.innerHTML = '';
  item.markers.forEach(m => {
    const ci2 = catInfo[m.type];
    const cls = NOTECLS[m.type] || 'note-link';
    const div = document.createElement('div');
    div.className = 'note-item ' + cls;
    div.innerHTML = '<strong>' + ci2.tag + ' ' + ci2.name.replace(/^[①②③④⑤]\s*/,'') + ' (' + m.text + ')</strong><br>' + m.note;
    notesDiv.appendChild(div);
  });

  document.getElementById('explainCard').style.display = 'block';
  updateWeakPanel();
  saveState();
}

function updateWeakPanel() {
  const wc = document.getElementById('weakContent');
  let html = '';
  let anyData = false;
  for (const cat of ['link','assim','elision','weak','flap']) {
    const d = state.weaknessByCat[cat];
    if (d.total === 0) continue;
    anyData = true;
    const rate = Math.round((d.wrong / d.total) * 100);
    html += '<div style="margin-bottom:6px;"><strong style="font-weight:500; color:var(--text);">' + catInfo[cat].name + '</strong>: 誤答率 ' + rate + '% (' + d.wrong + '/' + d.total + ')</div>';
  }
  if (!anyData) html = '解答するとここに弱点が表示されます。';
  const mistakeCount = Object.values(state.mistakes).filter(v => v > 0).length;
  html += '<div style="margin-top:8px;">猛特訓キューに残っている問題: ' + mistakeCount + ' 問</div>';
  wc.innerHTML = html;
}

function speak() {
  if (!('speechSynthesis' in window)) {
    alert('お使いのブラウザは音声読み上げに対応していません。');
    return;
  }
  const utter = new SpeechSynthesisUtterance(currentItem.full);
  utter.lang = 'en-US';

  // この問題用に選ばれた音声を使う（未設定ならここで選ぶ）
  if (!currentVoice) {
    currentVoice = pickRandomEnglishVoice();
  }
  if (currentVoice) {
    utter.voice = currentVoice;
    utter.lang = currentVoice.lang;
  }
  updateVoiceDebug();

  utter.rate = parseFloat(document.getElementById('speed').value);
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

document.getElementById('playbtn').addEventListener('click', speak);
document.getElementById('nextbtn').addEventListener('click', render);
document.getElementById('weakbtn').addEventListener('click', () => {
  const p = document.getElementById('weakPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  updateWeakPanel();
});
document.getElementById('voicebtn').addEventListener('click', () => {
  const p = document.getElementById('voicePanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  if (p.style.display === 'block') {
    loadVoices();
    renderVoicePanel();
  }
});
document.getElementById('drillbtn').addEventListener('click', () => {
  const weakKeys = Object.keys(state.mistakes).filter(k => state.mistakes[k] > 0);
  if (weakKeys.length === 0) {
    alert('まだ間違えた問題がありません。通常モードを進めてください。');
    return;
  }
  drillMode = true;
  isRetry = false;
  document.getElementById('drillBanner').style.display = 'flex';
  render();
});
document.getElementById('exitDrill').addEventListener('click', () => {
  drillMode = false;
  document.getElementById('drillBanner').style.display = 'none';
  render();
});
document.getElementById('resetbtn').addEventListener('click', () => {
  if (confirm('進捗(レベル・正解数・弱点記録)をすべてリセットします。よろしいですか?')) {
    localStorage.removeItem(STORAGE_KEY);
    state = {
      level: 1,
      score: 0,
      total: 0,
      streak: 0,
      mistakes: {},
      weaknessByCat: {link:{wrong:0,total:0}, assim:{wrong:0,total:0}, elision:{wrong:0,total:0}, weak:{wrong:0,total:0}, flap:{wrong:0,total:0}},
      usedInLevel: []
    };
    drillMode = false;
    isRetry = false;
    document.getElementById('drillBanner').style.display = 'none';
    queue = buildQueueForLevel(state.level);
    render();
  }
});

// 初期化
loadState();
queue = buildQueueForLevel(state.level);
render();
</script>
<script>
var TRAP_ITEMS = [
/* ===== C9 結論・態度・人数 ===== */
{type:"C9",scene:"友だちの会話：スタジアムへの行き方",

{type:"C9",scene:"3人で文化祭の場所を相談",

];;
var Trap = (function(){
  var TN={C9:"C9 結論・態度・人数",C7:"C7 言い換え",C5:"C5 視覚照合"};
  var mode="all",list=[],idx=0,score=0,answered=false,speed=0.95;
  var per={C9:[0,0],C7:[0,0],C5:[0,0]};
  function $(id){return document.getElementById(id);}
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");}
  var NUM=["①","②","③","④"];
  function build(){
    list = mode==="all"?TRAP_ITEMS.slice():TRAP_ITEMS.filter(function(x){return x.type===mode;});
    idx=0;score=0;answered=false;per={C9:[0,0],C7:[0,0],C5:[0,0]};
    $("t_total").textContent=list.length;$("t_score").textContent=0;render();
  }
  function render(){
    $("t_pos").textContent=Math.min(idx+1,list.length);
    if(idx>=list.length){summary();return;}
    var it=list[idx];answered=false;var cls=it.type.toLowerCase();
    $("t_app").innerHTML='<div class="trcard"><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px"><span class="trbadge '+cls+'">'+TN[it.type]+'</span><span class="trscene">'+esc(it.scene)+'</span></div>'
     +'<div style="display:flex;gap:8px;margin:8px 0"><button class="trbtn play" id="t_play">🔊 音声を聞く</button><button class="trbtn" id="t_speed">速さ：'+(speed>0.85?"標準":"ゆっくり")+'</button></div>'
     +'<div class="trscript">'+esc(it.script)+'</div><div class="trq">'+esc(it.q)+'</div>'
     +'<div class="trchoices" id="t_choices"></div><div class="trfb" id="t_fb"></div><div class="trnav" id="t_nav"></div></div>';
    var ch=$("t_choices");
    it.choices.forEach(function(c,i){var btn=document.createElement("button");btn.className="trchoice";btn.innerHTML="<b>"+NUM[i]+"</b> "+esc(c);btn.onclick=function(){pick(i);};ch.appendChild(btn);});
    $("t_play").onclick=function(){speak(it.script);};
    $("t_speed").onclick=function(){speed=speed>0.85?0.75:0.95;render();};
  }
  function pick(i){
    if(answered)return;answered=true;var it=list[idx];per[it.type][1]++;
    if(i===it.ans){score++;per[it.type][0]++;$("t_score").textContent=score;}
    var bs=document.querySelectorAll("#t_choices .trchoice");
    bs.forEach(function(b,j){b.classList.add("dim");b.style.cursor="default";if(j===it.ans)b.classList.add("correct");if(j===i&&i!==it.ans)b.classList.add("wrong");});
    var fb=$("t_fb");fb.classList.add("show");
    var h='<div class="trverdict '+(i===it.ans?"ok":"ng")+'">'+(i===it.ans?"正解！":"不正解")+'　正解は '+NUM[it.ans]+'</div>';
    it.why.forEach(function(w,j){if(!w)return;var ok=(j===it.ans);h+='<div class="trwhy '+(ok?"ok":"ng")+'"><span class="mk">'+(ok?"○":"×")+'</span>'+NUM[j]+' '+w+'</div>';});
    h+='<div class="trtip"><b>見抜くコツ：</b>'+it.tip+'</div>';fb.innerHTML=h;
    $("t_nav").innerHTML='<button class="trbtn" id="t_again">🔊 もう一度</button><button class="trbtn next" id="t_next">'+(idx+1>=list.length?"結果を見る":"次へ →")+'</button>';
    $("t_again").onclick=function(){speak(it.script);};
    $("t_next").onclick=function(){idx++;if(window.speechSynthesis)speechSynthesis.cancel();render();};
  }
  function summary(){
    var pct=list.length?Math.round(score/list.length*100):0;var rows="";var worst=null,wr=2;
    ["C9","C7","C5"].forEach(function(t){var a=per[t];if(a[1]===0)return;var r=a[0]/a[1];if(r<wr){wr=r;worst=t;}rows+='<div style="display:flex;align-items:center;gap:10px;margin:6px 0"><div style="width:150px;font-size:13px">'+TN[t]+'</div><div class="trmeter"><i style="width:'+Math.round(r*100)+'%"></i></div><div style="width:50px;text-align:right">'+a[0]+'/'+a[1]+'</div></div>';});
    var adv=worst?'いちばん伸びしろがあるのは <b>'+TN[worst]+'</b>。この型だけを選んで反復すると効率的です。':"";
    $("t_app").innerHTML='<div class="trcard trsum"><h2 style="margin:4px 0">結果</h2><div style="font-size:42px;font-weight:700">'+score+' / '+list.length+'</div><div style="color:var(--text-secondary);font-size:13px">正答率 '+pct+'%</div><div style="text-align:left;margin:12px 0">'+rows+'</div><div style="font-size:13px;margin-bottom:10px">'+adv+'</div><button class="trbtn next" id="t_retry">同じ範囲をもう一度</button></div>';
    $("t_retry").onclick=function(){build();};
  }
  function speak(script){
    if(!("speechSynthesis" in window)){alert("このブラウザは読み上げに未対応です。");return;}
    speechSynthesis.cancel();
    var voice=null;try{if(typeof pickRandomEnglishVoice==="function")voice=pickRandomEnglishVoice();}catch(e){}
    script.split("\n").forEach(function(line){
      var sp="",txt=line;var m=line.match(/^([A-Za-z]+):\s*(.*)$/);if(m){sp=m[1];txt=m[2];}
      var u=new SpeechSynthesisUtterance(txt);u.lang="en-US";u.rate=speed;
      var fem=/^(W|Mai|Lisa|Anne|Emily|Kate|Sara|Jessica)/.test(sp),mal=/^(M|Ken|Dan|Tom|Bob|John|Doug|Derek)/.test(sp);
      u.pitch=fem?1.2:(mal?0.85:1.0);if(voice){u.voice=voice;}
      speechSynthesis.speak(u);
    });
  }
  var started=false;
  function initSeg(){var seg=$("t_seg");if(!seg)return;seg.querySelectorAll("button").forEach(function(b){b.onclick=function(){seg.querySelectorAll("button").forEach(function(x){x.classList.remove("on");});b.classList.add("on");mode=b.dataset.m;if(window.speechSynthesis)speechSynthesis.cancel();build();};});}
  function start(){if(!started){initSeg();started=true;}build();}
  return {start:start};
})();
function showScreen(name){
  var ss=document.querySelectorAll(".screen");
  for(var i=0;i<ss.length;i++){ss[i].style.display="none";}
  var el=document.getElementById("screen-"+name);if(el)el.style.display="block";
  if(window.speechSynthesis)speechSynthesis.cancel();
  if(name==="trap")Trap.start();
  window.scrollTo(0,0);
}
document.querySelectorAll("[data-go]").forEach(function(b){b.onclick=function(){showScreen(b.dataset.go);};});
document.querySelectorAll("[data-back]").forEach(function(b){b.onclick=function(){showScreen("home");};});
</script>
