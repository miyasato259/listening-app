<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="リスニング特訓">
<title>音変化リスニング特訓 — つなぎ・弱音・消える音</title>
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --border: #e0ddd4;
    --border-strong: #c9c5b8;
    --text: #2c2c2a;
    --text-secondary: #6b6a64;
    --text-tertiary: #9b9a92;
    --accent-link: #534ab7;
    --accent-link-bg: rgba(127,119,221,0.18);
    --accent-weak: #0f6e56;
    --accent-weak-bg: rgba(29,158,117,0.18);
    --accent-elision: #993c1d;
    --accent-elision-bg: rgba(216,90,48,0.18);
    --success: #3b6d11;
    --success-bg: #eaf3de;
    --danger: #a32d2d;
    --danger-bg: #fcebeb;
    --warning: #854f0b;
    --warning-bg: #faeeda;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    padding-bottom: 2rem;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 1rem 1rem 2rem;
  }

  header {
    padding: 1rem 0 0.5rem;
    text-align: center;
  }
  header h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 4px;
  }
  header p {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0;
  }

  .statusbar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin: 1rem 0;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 8px 14px;
    font-size: 13px;
  }
  .stat-pill .val {
    font-size: 15px;
    font-weight: 500;
    margin-left: 6px;
  }
  .stat-pill .label {
    color: var(--text-secondary);
  }

  button {
    font-family: inherit;
    font-size: 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    background: var(--surface);
    color: var(--text);
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
  }
  button:hover { background: #f0eee7; }
  button:active { transform: scale(0.98); }

  .icon-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  select {
    font-family: inherit;
    font-size: 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    background: var(--surface);
    color: var(--text);
    padding: 8px 10px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .panel-secondary {
    background: #efece3;
    border-radius: var(--radius-md);
    padding: 1rem;
    margin-bottom: 1rem;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .banner {
    border-radius: var(--radius-md);
    padding: 8px 14px;
    margin-bottom: 1rem;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .banner-warning { background: var(--warning-bg); color: var(--warning); }
  .banner-danger { background: var(--danger-bg); color: var(--danger); }
  .banner button { font-size: 12px; padding: 2px 10px; }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .choices {
    display: grid;
    gap: 8px;
  }
  .choices button {
    text-align: left;
    padding: 12px 14px;
    line-height: 1.5;
  }
  .choices button.correct {
    border-color: var(--success);
    background: var(--success-bg);
  }
  .choices button.incorrect {
    border-color: var(--danger);
    background: var(--danger-bg);
  }

  #feedback {
    margin-top: 12px;
    font-size: 14px;
    min-height: 1.5em;
  }
  #feedback .ok { color: var(--success); }
  #feedback .ng { color: var(--danger); }

  .explain-card {
    display: none;
  }
  .explain-card .sentence {
    font-weight: 500;
    font-size: 16px;
    margin: 0 0 6px;
  }
  .explain-card .kana {
    font-size: 13px;
    margin: 0 0 10px;
    color: var(--text-secondary);
  }
  .explain-card .ja {
    font-size: 14px;
    margin: 0 0 10px;
    color: var(--text-secondary);
  }
  .notes { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .note-item {
    border-radius: var(--radius-md);
    padding: 8px 10px;
    font-size: 13px;
    line-height: 1.6;
  }
  .note-item strong { font-weight: 500; }
  .note-link { background: var(--accent-link-bg); }
  .note-weak { background: var(--accent-weak-bg); }
  .note-elision { background: var(--accent-elision-bg); }

  .mark-link { background: var(--accent-link-bg); color: var(--text); padding: 1px 3px; border-radius: 4px; }
  .mark-weak { background: var(--accent-weak-bg); color: var(--text); padding: 1px 3px; border-radius: 4px; }
  .mark-elision { background: var(--accent-elision-bg); color: var(--text); padding: 1px 3px; border-radius: 4px; }

  .score-row {
    display: flex;
    gap: 16px;
    margin-top: 1.5rem;
    justify-content: center;
  }
  .score-item { text-align: center; }
  .score-item .label { font-size: 13px; color: var(--text-secondary); margin: 0; }
  .score-item .num { font-size: 20px; font-weight: 500; margin: 2px 0 0; }

  .footer-row {
    text-align: center;
    margin-top: 2rem;
  }
  .footer-row button {
    font-size: 12px;
    color: var(--text-tertiary);
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>音変化リスニング特訓</h1>
    <p>①つなぎ ②弱音 ③消える音 を聞き分ける</p>
  </header>

  <div class="statusbar">
    <div class="stat-pill"><span class="label">レベル</span><span class="val" id="levelLabel"></span></div>
    <div class="stat-pill"><span class="label">連続正解</span><span class="val" id="streak">0</span></div>
    <button id="weakbtn" class="icon-btn" style="margin-left:auto;">弱点分析</button>
  </div>

  <div id="weakPanel" class="panel-secondary" style="display:none;">
    <p style="font-weight:500; margin:0 0 8px; color:var(--text);">弱点分析</p>
    <div id="weakContent"></div>
    <button id="drillbtn" class="icon-btn" style="margin-top:10px;">猛特訓モードで弱点を集中練習</button>
  </div>

  <div id="drillBanner" class="banner banner-warning" style="display:none;">
    <span>猛特訓モード中</span>
    <button id="exitDrill">通常モードに戻る</button>
  </div>

  <div id="retryBanner" class="banner banner-danger" style="display:none;">
    同じレベルの新しい問題です。正解するまで続きます。
  </div>

  <div id="intro" class="panel-secondary"></div>

  <div class="controls-row">
    <button id="playbtn" class="icon-btn">▶ 再生</button>
    <label style="font-size:13px; color:var(--text-secondary);">速度</label>
    <select id="speed">
      <option value="1">ノーマル</option>
      <option value="0.7">ゆっくり</option>
      <option value="0.5">超ゆっくり</option>
    </select>
  </div>

  <div id="voiceDebug" style="font-size:11px; color:var(--text-secondary); margin-top:4px;"></div>

  <div class="panel">
    <p style="font-size:13px; color:var(--text-secondary); margin:0 0 8px;">この音は何と聞こえましたか?選んでください</p>
    <div id="choices" class="choices"></div>
    <div id="feedback"></div>
  </div>

  <div id="explainCard" class="panel-secondary explain-card">
    <p class="sentence" id="explainSentence"></p>
    <p class="kana" id="explainKana"></p>
    <p class="ja" id="explainJa"></p>
    <div class="notes" id="explainNotes"></div>
    <button id="nextbtn" class="icon-btn">次へ →</button>
  </div>

  <div class="score-row">
    <div class="score-item"><p class="label">正解</p><p class="num" id="score">0</p></div>
    <div class="score-item"><p class="label">挑戦</p><p class="num" id="total">0</p></div>
    <div class="score-item"><p class="label">このレベルの問題数</p><p class="num" id="bankSize">0</p></div>
  </div>

  <div class="footer-row">
    <button id="resetbtn">進捗をリセットする</button>
  </div>
</div>

<script>
const LEVELS = ['中1〜中2','中3〜高1','高2','高3標準','共通テスト/英検準1級'];

const bank = [

          {type:'weak', text:"you're likely to", note:"you'reは弱形でほとんど聞こえず、likely toと一塊で滑らかに発音されます。"}]},

const catInfo = {
  link: {name:'① つなぎ(リンキング)', tag:'①', desc:"単語と単語がつながって発音される現象。子音+母音、d/t+yの破裂音化などが代表例です。"},
  weak: {name:'② 弱音(弱形)', tag:'②', desc:"前置詞・代名詞・助動詞などの機能語が弱まり、シュワ(あいまい母音)になる現象です。"},
  elision: {name:'③ 消える音(脱落)', tag:'③', desc:"特にt/dの音が、前後の子音にはさまれたり語末で開放されず聞こえなくなる現象です。"}
};

const STORAGE_KEY = 'listening_trainer_progress_v1';

let state = {
  level: 1,
  score: 0,
  total: 0,
  streak: 0,
  mistakes: {},
  weaknessByCat: {link:{wrong:0,total:0}, weak:{wrong:0,total:0}, elision:{wrong:0,total:0}},
  usedInLevel: []
};

let queue = [];
let currentItem = null;
let drillMode = false;
let isRetry = false;
let answered = false;

// 英語音声を確実に選択するための処理（iOSで日本語音声が使われてしまう問題への対策）
let cachedVoices = [];
let currentVoice = null;
function loadVoices() {
  cachedVoices = speechSynthesis.getVoices();
  updateVoiceDebug();
}
if ('speechSynthesis' in window) {
  loadVoices();
  if ('onvoiceschanged' in speechSynthesis) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }
}
// 利用可能な英語音声(en-*)を全部リストアップ
function getEnglishVoices() {
  const voices = cachedVoices.length ? cachedVoices : speechSynthesis.getVoices();
  return voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('en'));
}
// その中からランダムに1つ選ぶ（男性・女性・様々なアクセントが混在）
function pickRandomEnglishVoice() {
  const enVoices = getEnglishVoices();
  if (enVoices.length === 0) return null;
  return enVoices[Math.floor(Math.random() * enVoices.length)];
}
// 現在使える英語音声の一覧と、選ばれている音声を画面に表示（デバッグ用）
function updateVoiceDebug() {
  const el = document.getElementById('voiceDebug');
  if (!el) return;
  const enVoices = getEnglishVoices();
  if (enVoices.length === 0) {
    el.textContent = '英語音声: 取得できていません（0個）';
    return;
  }
  const names = enVoices.map(v => v.name + '(' + v.lang + ')').join(', ');
  const current = currentVoice ? (currentVoice.name + '(' + currentVoice.lang + ')') : '未選択';
  el.textContent = '英語音声 ' + enVoices.length + '個: ' + names + ' / 今回: ' + current;
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn('保存に失敗しました', e);
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = Object.assign(state, parsed);
      if (!state.weaknessByCat) state.weaknessByCat = {link:{wrong:0,total:0}, weak:{wrong:0,total:0}, elision:{wrong:0,total:0}};
      if (!state.mistakes) state.mistakes = {};
      if (!state.usedInLevel) state.usedInLevel = [];
    }
  } catch (e) {
    console.warn('読み込みに失敗しました', e);
  }
}

function indexOf(item){ return bank.indexOf(item); }

function buildQueueForLevel(lv) {
  const pool = bank.filter(b => b.level === lv);
  return shuffle([...pool]);
}
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickRetryItem(lv) {
  const pool = bank.filter(b => b.level === lv);
  const usedSet = new Set(state.usedInLevel);
  const unused = pool.filter(b => !usedSet.has(indexOf(b)));
  if (unused.length > 0) {
    return unused[Math.floor(Math.random() * unused.length)];
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

function pickNext() {
  if (drillMode) {
    const weakKeys = Object.keys(state.mistakes).filter(k => state.mistakes[k] > 0);
    if (weakKeys.length === 0) {
      drillMode = false;
      document.getElementById('drillBanner').style.display = 'none';
    } else {
      const idx = parseInt(weakKeys[Math.floor(Math.random() * weakKeys.length)]);
      return bank[idx];
    }
  }
  if (isRetry) {
    return pickRetryItem(state.level);
  }
  if (queue.length === 0) {
    if (state.level < 5) state.level++;
    queue = buildQueueForLevel(state.level);
    state.usedInLevel = [];
  }
  return queue.shift();
}

function highlightSentence(item) {
  const markersSorted = [...item.markers].sort((a,b) => b.text.length - a.text.length);
  let result = item.full;
  markersSorted.forEach((m, mi) => {
    const tag = catInfo[m.type].tag;
    const placeholderOpen = '%%OPEN' + mi + '%%';
    const placeholderClose = '%%CLOSE' + mi + '%%';
    const idx2 = result.indexOf(m.text);
    if (idx2 >= 0) {
      result = result.slice(0, idx2) + placeholderOpen + m.text + ' ' + tag + placeholderClose + result.slice(idx2 + m.text.length);
    }
  });
  markersSorted.forEach((m, mi) => {
    const cls = m.type === 'link' ? 'mark-link' : (m.type === 'weak' ? 'mark-weak' : 'mark-elision');
    result = result.replace('%%OPEN' + mi + '%%', '<span class="' + cls + '">');
    result = result.replace('%%CLOSE' + mi + '%%', '</span>');
  });
  return result;
}

function render() {
  document.getElementById('levelLabel').textContent = LEVELS[state.level-1];
  document.getElementById('streak').textContent = state.streak;
  document.getElementById('retryBanner').style.display = isRetry ? 'flex' : 'none';
  currentItem = pickNext();
  currentVoice = pickRandomEnglishVoice();
  updateVoiceDebug();
  if (!isRetry) state.usedInLevel.push(indexOf(currentItem));
  answered = false;
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('explainCard').style.display = 'none';

  const ci = catInfo[currentItem.cat];
  document.getElementById('intro').innerHTML = '<strong style="font-weight:500; color:var(--text);">' + ci.name + '</strong> &mdash; ' + ci.desc;

  const poolSize = bank.filter(b => b.level === state.level).length;
  document.getElementById('bankSize').textContent = poolSize;
  document.getElementById('score').textContent = state.score;
  document.getElementById('total').textContent = state.total;

  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  const order = shuffle([0,1,2]);
  order.forEach(i => {
    const btn = document.createElement('button');
    btn.textContent = currentItem.choices[i];
    btn.onclick = () => selectAnswer(i, btn);
    choicesDiv.appendChild(btn);
  });

  saveState();
}

function selectAnswer(i, btn) {
  if (answered) return;
  answered = true;
  state.total++;
  const item = currentItem;
  const key = indexOf(item);
  const fb = document.getElementById('feedback');

  state.weaknessByCat[item.cat].total++;

  if (i === item.answer) {
    state.score++;
    state.streak++;
    isRetry = false;
    fb.innerHTML = '<span class="ok">正解です</span>';
    btn.classList.add('correct');
    if (state.mistakes[key] > 0) state.mistakes[key]--;
  } else {
    state.streak = 0;
    isRetry = true;
    state.weaknessByCat[item.cat].wrong++;
    state.mistakes[key] = (state.mistakes[key] || 0) + 2;
    fb.innerHTML = '<span class="ng">不正解 &mdash; 同じレベルの新しい問題に挑戦しましょう</span>';
    btn.classList.add('incorrect');
    const buttons = document.querySelectorAll('#choices button');
    buttons.forEach(b => { if (b.textContent === item.choices[item.answer]) b.classList.add('correct'); });
  }
  document.getElementById('score').textContent = state.score;
  document.getElementById('total').textContent = state.total;
  document.getElementById('streak').textContent = state.streak;

  document.getElementById('explainSentence').innerHTML = highlightSentence(item);
  document.getElementById('explainKana').textContent = '発音イメージ: ' + item.spoken;
  document.getElementById('explainJa').textContent = '訳: ' + item.ja;

  const notesDiv = document.getElementById('explainNotes');
  notesDiv.innerHTML = '';
  item.markers.forEach(m => {
    const ci2 = catInfo[m.type];
    const cls = m.type === 'link' ? 'note-link' : (m.type === 'weak' ? 'note-weak' : 'note-elision');
    const div = document.createElement('div');
    div.className = 'note-item ' + cls;
    div.innerHTML = '<strong>' + ci2.tag + ' ' + ci2.name.replace(/^[①②③]\s*/,'') + ' (' + m.text + ')</strong><br>' + m.note;
    notesDiv.appendChild(div);
  });

  document.getElementById('explainCard').style.display = 'block';
  updateWeakPanel();
  saveState();
}

function updateWeakPanel() {
  const wc = document.getElementById('weakContent');
  let html = '';
  let anyData = false;
  for (const cat of ['link','weak','elision']) {
    const d = state.weaknessByCat[cat];
    if (d.total === 0) continue;
    anyData = true;
    const rate = Math.round((d.wrong / d.total) * 100);
    html += '<div style="margin-bottom:6px;"><strong style="font-weight:500; color:var(--text);">' + catInfo[cat].name + '</strong>: 誤答率 ' + rate + '% (' + d.wrong + '/' + d.total + ')</div>';
  }
  if (!anyData) html = '解答するとここに弱点が表示されます。';
  const mistakeCount = Object.values(state.mistakes).filter(v => v > 0).length;
  html += '<div style="margin-top:8px;">猛特訓キューに残っている問題: ' + mistakeCount + ' 問</div>';
  wc.innerHTML = html;
}

function speak() {
  if (!('speechSynthesis' in window)) {
    alert('お使いのブラウザは音声読み上げに対応していません。');
    return;
  }
  const utter = new SpeechSynthesisUtterance(currentItem.full);
  utter.lang = 'en-US';

  // この問題用に選ばれた音声を使う（未設定ならここで選ぶ）
  if (!currentVoice) {
    currentVoice = pickRandomEnglishVoice();
  }
  if (currentVoice) {
    utter.voice = currentVoice;
    utter.lang = currentVoice.lang;
  }
  updateVoiceDebug();

  utter.rate = parseFloat(document.getElementById('speed').value);
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

document.getElementById('playbtn').addEventListener('click', speak);
document.getElementById('nextbtn').addEventListener('click', render);
document.getElementById('weakbtn').addEventListener('click', () => {
  const p = document.getElementById('weakPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  updateWeakPanel();
});
document.getElementById('drillbtn').addEventListener('click', () => {
  const weakKeys = Object.keys(state.mistakes).filter(k => state.mistakes[k] > 0);
  if (weakKeys.length === 0) {
    alert('まだ間違えた問題がありません。通常モードを進めてください。');
    return;
  }
  drillMode = true;
  isRetry = false;
  document.getElementById('drillBanner').style.display = 'flex';
  render();
});
document.getElementById('exitDrill').addEventListener('click', () => {
  drillMode = false;
  document.getElementById('drillBanner').style.display = 'none';
  render();
});
document.getElementById('resetbtn').addEventListener('click', () => {
  if (confirm('進捗(レベル・正解数・弱点記録)をすべてリセットします。よろしいですか?')) {
    localStorage.removeItem(STORAGE_KEY);
    state = {
      level: 1,
      score: 0,
      total: 0,
      streak: 0,
      mistakes: {},
      weaknessByCat: {link:{wrong:0,total:0}, weak:{wrong:0,total:0}, elision:{wrong:0,total:0}},
      usedInLevel: []
    };
    drillMode = false;
    isRetry = false;
    document.getElementById('drillBanner').style.display = 'none';
    queue = buildQueueForLevel(state.level);
    render();
  }
});

// 初期化
loadState();
queue = buildQueueForLevel(state.level);
render();
</script>
